<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Альфа копия</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header></header>
    <main>
      <div class="bentoGrid"></div>
      <div class="main">
        <div class="menu">
          <div class="head">
            <div class="pageName">
              <h1>Выбирайте лучшее</h1>
              <p data-js="categoryDisc">fffff</p>
            </div>
            <div class="selector">
              <div class="selectViser" data-js="selectVis"></div>
              <div class="selectBut" data-js="forAll"><p>Для всех</p></div>
              <div class="selectBut" data-js="littleComp">
                <p>Малому бизнесу</p>
              </div>
              <div class="selectBut" data-js="hugeComp">
                <p>Крупному бизнесу</p>
              </div>
            </div>
          </div>
          <div class="cardHolder" data-js="cardHolder"></div>
        </div>
        <div class="menu">
          <div class="head">
            <div class="pageName">
              <h1>Расчитайте выгоду</h1>
            </div>
          </div>
          <div class="calcCard">
            <div class="calcForm"></div>
            <div class="calcResult"><h3>Наше предложение</h3></div>
          </div>
        </div>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
